name: Verify Signal Quality

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: verify-signals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEFAULT_ECOBE_ENGINE_URL: https://ecobe-engineclaude-production.up.railway.app
  ECOBE_ENGINE_URL: ${{ secrets.ECOBE_ENGINE_URL }}
  ECOBE_ENGINE_API_KEY: ${{ secrets.ECOBE_ENGINE_API_KEY }}

jobs:
  verify-signals:
    name: Verify Signal Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve engine configuration
        shell: bash
        run: |
          echo "ENGINE_URL=${ECOBE_ENGINE_URL:-$DEFAULT_ECOBE_ENGINE_URL}" >> "$GITHUB_ENV"

      - name: Engine health check
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/health")
          echo "$response" | grep -q '"status":"healthy"\|"status":"ok"\|"status":"degraded"'

      - name: System status check
        run: |
          headers=()
          if [ -n "${ECOBE_ENGINE_API_KEY:-}" ]; then
            headers+=(-H "Authorization: Bearer ${ECOBE_ENGINE_API_KEY}")
            headers+=(-H "x-ecobe-internal-key: ${ECOBE_ENGINE_API_KEY}")
            headers+=(-H "x-api-key: ${ECOBE_ENGINE_API_KEY}")
          fi
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${headers[@]}" "${ENGINE_URL}/api/v1/system/status")
          echo "$response" | grep -q '"status":"healthy"\|"status":"operational"\|"status":"degraded"'

      - name: Assurance route - us-east-1
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/route/green" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["us-east-1"],"mode":"assurance","policyMode":"sec_disclosure_strict","carbonWeight":0.7}')
          echo "$response" | grep -q '"signalTypeUsed"'

      - name: Optimize route - eu-west-1
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/route/green" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["eu-west-1"],"mode":"optimize","carbonWeight":0.7}')
          echo "$response" | grep -q '"selectedRegion"'

      - name: Disclosure export check
        run: |
          headers=()
          if [ -n "${ECOBE_ENGINE_API_KEY:-}" ]; then
            headers+=(-H "Authorization: Bearer ${ECOBE_ENGINE_API_KEY}")
            headers+=(-H "x-ecobe-internal-key: ${ECOBE_ENGINE_API_KEY}")
            headers+=(-H "x-api-key: ${ECOBE_ENGINE_API_KEY}")
          fi
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${headers[@]}" "${ENGINE_URL}/api/v1/disclosure/export?format=json&mode=assurance")
          echo "$response" | grep -q '"batch_id"'

      - name: Forecast accuracy check
        run: curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/api/v1/forecasting/accuracy"

  failure-alert:
    name: Failure Alert
    runs-on: ubuntu-latest
    needs: verify-signals
    if: ${{ always() && needs.verify-signals.result == 'failure' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send failure alert
        run: node .github/scripts/send-resend-alert.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ALERTS: ${{ secrets.RESEND_FROM_ALERTS }}
          ALERT_INBOX_EMAIL: ${{ secrets.ALERT_INBOX_EMAIL }}
          ALERT_SUBJECT: 'CO2 Router signal verification failure'
          ALERT_SUMMARY: 'The scheduled signal verification workflow failed.'
