name: Verify Signal Quality

# Verify engine health and live signals across key regions
# Calls health + CI routing which exercises the full provider stack
# Frequency: Every 6 hours

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  DEFAULT_ECOBE_ENGINE_URL: https://ecobe-engineclaude-production.up.railway.app
  ECOBE_ENGINE_URL: ${{ secrets.ECOBE_ENGINE_URL }}
  ECOBE_ENGINE_API_KEY: ${{ secrets.ECOBE_ENGINE_API_KEY }}

jobs:
  verify-signals:
    name: Verify Signal Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve engine configuration
        shell: bash
        run: |
          echo "ENGINE_URL=${ECOBE_ENGINE_URL:-$DEFAULT_ECOBE_ENGINE_URL}" >> "$GITHUB_ENV"

      - name: Engine health check
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/health")
          echo "Engine health: $response"
          echo "$response" | grep -q '"status":"ok"' || (echo "Engine degraded" && exit 1)

      - name: System status check
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/api/v1/system/status")
          echo "System status: $response"
          echo "$response" | grep -q '"status":"healthy"' || (echo "System status degraded" && exit 1)

      - name: Assurance route - us-east-1
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/route/green" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["us-east-1"],"mode":"assurance","policyMode":"sec_disclosure_strict","carbonWeight":0.7}')
          echo "us-east-1 signal: $response"
          echo "$response" | grep -q '"signalTypeUsed":"average_operational"' || (echo "Assurance mode returned non-disclosure-safe signal" && exit 1)

      - name: Optimize route - eu-west-1
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/route/green" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["eu-west-1"],"mode":"optimize","carbonWeight":0.7}')
          echo "eu-west-1 signal: $response"
          echo "$response" | grep -q '"selectedRegion":"eu-west-1"' || (echo "No route selected for eu-west-1" && exit 1)

      - name: Disclosure export check
        run: |
          response=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/api/v1/disclosure/export?format=json&mode=assurance")
          echo "Disclosure export: $response"
          echo "$response" | grep -q '"batch_id"' || (echo "Disclosure export missing batch metadata" && exit 1)

      - name: Forecast accuracy check
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/api/v1/forecasting/accuracy"
          echo "Signal verification complete"
