name: Warm Cache

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: warm-cache-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEFAULT_ECOBE_ENGINE_URL: https://ecobe-engineclaude-production.up.railway.app
  ECOBE_ENGINE_URL: ${{ secrets.ECOBE_ENGINE_URL }}
  ECOBE_ENGINE_API_KEY: ${{ secrets.ECOBE_ENGINE_API_KEY }}

jobs:
  warm-cache:
    name: Warm Signal Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve engine configuration
        shell: bash
        run: |
          echo "ENGINE_URL=${ECOBE_ENGINE_URL:-$DEFAULT_ECOBE_ENGINE_URL}" >> "$GITHUB_ENV"

      - name: Verify engine is up
        run: curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/health"

      - name: Warm - us-east-1
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["us-east-1"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Warm - us-east-2
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["us-east-2"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Warm - us-west-2
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["us-west-2"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Warm - eu-west-1
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["eu-west-1"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Warm - eu-central-1
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["eu-central-1"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Warm - ap-southeast-1
        run: |
          curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 45 -sf -X POST "${ENGINE_URL}/api/v1/ci/route" \
            -H "Content-Type: application/json" \
            -d '{"preferredRegions":["ap-southeast-1"],"carbonWeight":0.7,"jobType":"standard"}'

      - name: Confirm cache warmed
        run: curl --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 30 -sf "${ENGINE_URL}/health"

  failure-alert:
    name: Failure Alert
    runs-on: ubuntu-latest
    needs: warm-cache
    if: ${{ always() && needs.warm-cache.result == 'failure' }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send failure alert
        run: node .github/scripts/send-resend-alert.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ALERTS: ${{ secrets.RESEND_FROM_ALERTS }}
          ALERT_INBOX_EMAIL: ${{ secrets.ALERT_INBOX_EMAIL }}
          ALERT_SUBJECT: 'CO2 Router cache warm failure'
          ALERT_SUMMARY: 'The scheduled cache warming workflow failed.'
