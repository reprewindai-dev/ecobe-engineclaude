name: Verify Live Dashboard

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'ecobe-engine/**'
      - 'ecobe-dashboard/**'
      - 'docs/public/**'
      - 'docs/private/design-partner-program/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - 'ecobe-engine/**'
      - 'ecobe-dashboard/**'
      - 'docs/public/**'
      - 'docs/private/design-partner-program/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-live-dashboard-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_DASHBOARD_URL: https://co2router.com
  DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

jobs:
  determine-scope:
    name: Determine Scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
      dashboard_live_required: ${{ steps.scope.outputs.dashboard_live_required }}
      dashboard_skip_reason: ${{ steps.scope.outputs.dashboard_skip_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - id: scope
        name: Classify changed files
        run: node .github/scripts/classify-run-scope.mjs
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}

  verify-live-dashboard:
    name: Dashboard Route Verification
    runs-on: ubuntu-latest
    needs: determine-scope
    if: ${{ needs.determine-scope.outputs.dashboard_live_required == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify live dashboard routes and gates
        run: node .github/scripts/verify-live-dashboard.mjs

  failure-alert:
    name: Dashboard Verification Failure Alert
    runs-on: ubuntu-latest
    needs: [determine-scope, verify-live-dashboard]
    if: ${{ always() && needs.determine-scope.outputs.dashboard_live_required == 'true' && needs.verify-live-dashboard.result == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send failure alert
        run: node .github/scripts/send-resend-alert.mjs
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ALERTS: ${{ secrets.RESEND_FROM_ALERTS }}
          ALERT_INBOX_EMAIL: ${{ secrets.ALERT_INBOX_EMAIL }}
          ALERT_SUBJECT: CO2 Router dashboard live verification failure
          ALERT_SUMMARY: Dashboard live verification or fast-mode gate failed.

  verify-live-dashboard-status:
    name: Verify Live Dashboard
    runs-on: ubuntu-latest
    needs: [determine-scope, verify-live-dashboard]
    if: always()
    steps:
      - name: Skip docs-only changes
        if: ${{ needs.determine-scope.outputs.dashboard_live_required != 'true' }}
        run: |
          echo "Dashboard verification skipped: ${{ needs.determine-scope.outputs.dashboard_skip_reason }}"

      - name: Check dashboard verification status
        if: ${{ needs.determine-scope.outputs.dashboard_live_required == 'true' }}
        shell: bash
        run: |
          if [ "${{ needs.verify-live-dashboard.result }}" != "success" ]; then
            echo "Dashboard verification failed"
            exit 1
          fi
          echo "Dashboard verification passed"
