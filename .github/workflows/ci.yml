name: Engine CI

on:
  push:
  pull_request:

concurrency:
  group: engine-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  engine-build:
    name: Engine Build, Test, and Docker Verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ecobe-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecobe-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Type check
        run: npm run type-check
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Run tests
        run: npm test -- --runInBand --passWithNoTests
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379/1
          NODE_ENV: test

  engine-docker:
    name: Engine Docker Build
    runs-on: ubuntu-latest
    needs: engine-build
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ecobe-engine:test
          build-args: |
            BUILDTIME_DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max
