name: CI

# Build, test, and verify the dashboard and engine on every push and PR
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─── Dashboard Build & Type Check ─────────────────────────────────────────────
  dashboard-build:
    name: Dashboard Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ecobe-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ecobe-dashboard/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Build standalone
        run: npm run build
        env:
          # Use localhost defaults for build verification
          ECOBE_API_URL: 'http://localhost:3000'
          NEXT_PUBLIC_ECOBE_API_URL: '/api/ecobe'

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js || (echo "Error: .next/standalone/server.js not found" && exit 1)
          test -d .next/static || (echo "Error: .next/static not found" && exit 1)
          echo "✓ Standalone build output verified"

  # ─── Dashboard Docker Build ───────────────────────────────────────────────────
  dashboard-docker:
    name: Dashboard Docker Build
    runs-on: ubuntu-latest
    needs: dashboard-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ecobe-dashboard
          push: false
          tags: ecobe-dashboard:test
          build-args: |
            ECOBE_API_URL=http://localhost:3000
            NEXT_PUBLIC_ECOBE_API_URL=/api/ecobe
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Engine Build & Type Check ────────────────────────────────────────────────
  engine-build:
    name: Engine Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecobe-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecobe-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: TypeScript type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
          NODE_ENV: test

  # ─── Shared CI Status ─────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [dashboard-build, dashboard-docker, engine-build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.dashboard-build.result }}" == "failure" ] || \
             [ "${{ needs.dashboard-docker.result }}" == "failure" ] || \
             [ "${{ needs.engine-build.result }}" == "failure" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
