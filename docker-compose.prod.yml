version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecobe-postgres
    environment:
      POSTGRES_USER: ecobe
      POSTGRES_PASSWORD: ecobe
      POSTGRES_DB: ecobe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecobe"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecobe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ECOBE Engine
  ecobe-engine:
    build:
      context: ./ecobe-engine
      dockerfile: Dockerfile
    container_name: ecobe-engine
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ecobe:ecobe@postgres:5432/ecobe
      REDIS_URL: redis://redis:6379
      ELECTRICITY_MAPS_API_KEY: ${ELECTRICITY_MAPS_API_KEY}
      ELECTRICITY_MAPS_BASE_URL: https://api.electricitymap.org
      DEFAULT_MAX_CARBON_G_PER_KWH: 400
      DEKES_API_URL: ${DEKES_API_URL}
      DEKES_API_KEY: ${DEKES_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ECOBE Dashboard
  ecobe-dashboard:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: ecobe-dashboard
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ECOBE_ENGINE_URL: http://localhost:3000
      NEXT_PUBLIC_ECOBE_ENGINE_API_KEY: ${ECOBE_ENGINE_API_KEY}
    depends_on:
      - ecobe-engine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: ecobe-network
