name: 'CO2 Router Pre-Execution Authorization'
description: 'Authorize GitHub Actions execution before runner spend using the full CO2 Router five-action doctrine.'
author: 'ECOBE'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  engine-url:
    description: 'Base URL for the CO2 Router engine'
    required: true
  api-key:
    description: 'Internal CO2 Router API key used for pre-execution authorization'
    required: true
  workload-id:
    description: 'Stable workload identifier for the governed decision frame'
    required: false
  job-name:
    description: 'Human-readable workflow job name'
    required: false
  preferred-regions:
    description: 'Candidate execution regions (comma-separated)'
    required: false
    default: 'us-east-1,us-west-2,eu-west-1'
  workload-class:
    description: 'Governed workload class'
    required: false
    default: 'interactive'
  job-type:
    description: 'Execution intensity profile'
    required: false
    default: 'standard'
  criticality:
    description: 'Execution criticality used by doctrine and enforcement bundles'
    required: false
    default: 'standard'
  decision-mode:
    description: 'runtime_authorization enforces; scenario_planning simulates'
    required: false
    default: 'runtime_authorization'
  water-policy-profile:
    description: 'Water policy profile applied to the request'
    required: false
    default: 'default'
  allow-delay:
    description: 'Allow the engine to return delay decisions'
    required: false
    default: 'true'
  max-delay-minutes:
    description: 'Maximum allowed delay window in minutes'
    required: false
    default: '30'
  critical-path:
    description: 'Marks the workload as critical path, constraining delay behavior'
    required: false
    default: 'false'
  deadline-at:
    description: 'Optional ISO8601 deadline for bounded delay decisions'
    required: false
  carbon-weight:
    description: 'Optional carbon weight override (0-1)'
    required: false
  water-weight:
    description: 'Optional water weight override (0-1)'
    required: false
  latency-weight:
    description: 'Optional latency weight override (0-1)'
    required: false
  cost-weight:
    description: 'Optional cost weight override (0-1)'
    required: false
  timeout-seconds:
    description: 'Timeout for API calls in seconds'
    required: false
    default: '30'
  fail-on-deny:
    description: 'Exit non-zero when the engine denies execution'
    required: false
    default: 'true'
  fail-on-delay:
    description: 'Exit non-zero when the engine defers execution'
    required: false
    default: 'true'
  fail-on-non-executable:
    description: 'Exit non-zero when the returned bundle is not executable'
    required: false
    default: 'true'

outputs:
  decision:
    description: 'Binding action returned by the doctrine'
  policy-action:
    description: 'Alias for the binding action'
  reason-code:
    description: 'Stable machine-readable reason for the decision'
  decision-frame-id:
    description: 'Deterministic decision frame id'
  decision-id:
    description: 'Legacy alias for decision-frame-id'
  proof-hash:
    description: 'SHA-256 proof hash for the governed decision envelope'
  approved-region:
    description: 'Approved execution region'
  approved-runner-label:
    description: 'Approved GitHub runner label'
  approved-runs-on-json:
    description: 'JSON array suitable for runs-on in downstream jobs'
  matrix-allowed-regions:
    description: 'JSON array of regions allowed by the GitHub Actions bundle'
  executable:
    description: 'Whether the returned bundle is executable in runtime mode'
  environment:
    description: 'GitHub environment string from the enforcement bundle'
  max-parallel:
    description: 'Approved matrix concurrency ceiling'
  not-before:
    description: 'ISO8601 timestamp after which execution may proceed'
  policy-trace:
    description: 'JSON policy trace object'
  trust:
    description: 'JSON trust posture object'
  signal-confidence:
    description: 'Scalar confidence score'
  recommendation:
    description: 'Human-readable summary for logs'
  selected-runner:
    description: 'Legacy alias for approved-runner-label'
  selected-region:
    description: 'Legacy alias for approved-region'
  carbon-intensity:
    description: 'Selected region carbon intensity'
  baseline:
    description: 'Baseline region carbon intensity'
  savings:
    description: 'Estimated carbon reduction percent'

runs:
  using: 'node24'
  main: 'main.js'
