name: 'ECOBE Carbon-Aware Runner'
description: 'Call the ECOBE CI control plane and expose enforceable runner, delay, and concurrency outputs.'
author: 'ECOBE'
branding:
  icon: 'activity'
  color: 'green'

inputs:
  engine-url:
    description: 'Base URL for the ECOBE engine'
    required: true
  api-key:
    description: 'Internal ECOBE API key used for CI preflight'
    required: true
  workload-id:
    description: 'Stable workload identifier for audit records'
    required: false
  job-name:
    description: 'Human-readable workflow job name'
    required: false
  org-id:
    description: 'Optional organization id for policy lookup'
    required: false
  candidate-regions:
    description: 'Candidate execution regions (comma-separated)'
    required: false
    default: 'eastus,northeurope,norwayeast'
  preferred-regions:
    description: 'Deprecated alias for candidate-regions'
    required: false
    default: ''
  baseline-region:
    description: 'Explicit baseline region for savings comparison'
    required: false
  candidate-runners:
    description: 'Candidate runner labels (comma-separated)'
    required: false
    default: 'ubuntu-latest,windows-latest,macos-latest'
  job-type:
    description: 'Job type used for energy estimation'
    required: false
    default: 'standard'
  duration-minutes:
    description: 'Estimated job duration in minutes'
    required: false
    default: '20'
  delay-tolerance-minutes:
    description: 'Maximum allowed deferral window in minutes'
    required: false
    default: '0'
  deadline:
    description: 'Optional ISO8601 deadline for bounded delay decisions'
    required: false
  signal-profile:
    description: 'Signal profile to use for the decision'
    required: false
    default: 'us_official'
  criticality:
    description: 'Workload criticality'
    required: false
    default: 'standard'
  matrix-size:
    description: 'Requested parallel matrix width'
    required: false
    default: '1'
  assurance-mode:
    description: 'When true, fail closed on low-confidence fallback signals'
    required: false
    default: 'false'
  carbon-weight:
    description: 'Optional carbon weight override (0-1)'
    required: false
  latency-weight:
    description: 'Optional latency weight override (0-1)'
    required: false
  cost-weight:
    description: 'Optional cost weight override (0-1)'
    required: false
  timeout-seconds:
    description: 'Timeout for API calls in seconds'
    required: false
    default: '30'
  fail-on-deny:
    description: 'Exit non-zero when the control plane denies execution'
    required: false
    default: 'true'
  repo:
    description: 'Repository slug for audit metadata'
    required: false
  workflow:
    description: 'Workflow name for audit metadata'
    required: false
  commit-sha:
    description: 'Commit SHA for audit metadata'
    required: false
  branch:
    description: 'Branch or ref name for audit metadata'
    required: false
  event-name:
    description: 'GitHub event name for audit metadata'
    required: false

outputs:
  decision:
    description: 'Deterministic decision: run_now, reroute, delay, throttle, or deny'
  reason-code:
    description: 'Stable machine-readable reason for the decision'
  approved-region:
    description: 'Approved execution region'
  approved-runner-label:
    description: 'Approved GitHub runner label'
  delay-seconds:
    description: 'Delay the workflow by this many seconds before running'
  max-parallel:
    description: 'Approved maximum concurrency for the workflow matrix'
  estimated-savings-percent:
    description: 'Estimated carbon savings versus the declared baseline region'
  decision-id:
    description: 'Decision id for audit and replay'
  baseline-carbon-intensity:
    description: 'Baseline carbon intensity in gCO2/kWh'
  selected-carbon-intensity:
    description: 'Selected carbon intensity in gCO2/kWh'
  signal-confidence:
    description: 'Confidence label for the selected decision path'
  policy-trace:
    description: 'JSON array describing the policy evaluation trace'
  recommendation:
    description: 'Human-readable summary for workflow logs'
  selected-runner:
    description: 'Legacy alias for approved-runner-label'
  selected-region:
    description: 'Legacy alias for approved-region'
  carbon-intensity:
    description: 'Legacy alias for selected-carbon-intensity'
  baseline:
    description: 'Legacy alias for baseline-carbon-intensity'
  savings:
    description: 'Legacy alias for estimated-savings-percent'

runs:
  using: 'node20'
  main: 'main.js'
