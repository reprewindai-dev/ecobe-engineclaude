name: CO₂Router Dashboard CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    name: Dashboard CI
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run type-check
        
      - name: Lint
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Validate frontend structure
        run: |
          echo "🏗️ Validating dashboard structure..."
          
          # Check critical files exist
          critical_files=(
            "src/app/layout.tsx"
            "src/app/page.tsx"
            "src/app/dekes/page.tsx"
            "src/components/integrations/DksDashboard.tsx"
            "src/app/api/integrations/dekes/route.ts"
          )
          
          for file in "${critical_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
          
      - name: Validate route imports
        run: |
          echo "🛣️ Validating route imports..."
          
          # Check layout imports
          node -e "
            try {
              require('./src/app/layout.tsx');
              console.log('✅ Layout imports work');
            } catch (e) {
              console.error('❌ Layout imports failed:', e.message);
              process.exit(1);
            }
          "
          
          # Check main page imports
          node -e "
            try {
              require('./src/app/page.tsx');
              console.log('✅ Main page imports work');
            } catch (e) {
              console.error('❌ Main page imports failed:', e.message);
              process.exit(1);
            }
          "
          
          # Check DKS dashboard imports
          node -e "
            try {
              require('./src/app/dekes/page.tsx');
              console.log('✅ DKS dashboard imports work');
            } catch (e) {
              console.error('❌ DKS dashboard imports failed:', e.message);
              process.exit(1);
            }
          "
          
      - name: Validate API client modules
        run: |
          echo "🔌 Validating API client modules..."
          
          # Check API route imports
          node -e "
            try {
              require('./src/app/api/integrations/dekes/route.ts');
              console.log('✅ API client modules work');
            } catch (e) {
              console.error('❌ API client modules failed:', e.message);
              process.exit(1);
            }
          "
          
      - name: Validate environment variables
        run: |
          echo "🔧 Validating environment configuration..."
          
          # Check next.config.js for required env vars
          if grep -q "ECOBE_API_URL" next.config.js; then
            echo "✅ ECOBE_API_URL configured in next.config.js"
          else
            echo "❌ ECOBE_API_URL missing from next.config.js"
            exit 1
          fi
          
          # Check .env.example exists and has required vars
          if [ -f ".env.example" ]; then
            echo "✅ .env.example exists"
            
            if grep -q "ECOBE_API_URL" .env.example; then
              echo "✅ ECOBE_API_URL documented in .env.example"
            else
              echo "⚠️ Consider documenting ECOBE_API_URL in .env.example"
            fi
          else
            echo "⚠️ Consider adding .env.example"
          fi
          
      - name: Validate branding consistency
        run: |
          echo "🎨 Validating branding consistency..."
          
          # Check for banned provider references
          if grep -r "Electricity Maps" src/ --include="*.tsx" --include="*.ts" 2>/dev/null; then
            echo "❌ Found banned 'Electricity Maps' references"
            exit 1
          else
            echo "✅ No banned provider references found"
          fi
          
          # Check for CO₂Router branding
          if grep -r "CO₂Router\|CO2Router" src/ --include="*.tsx" --include="*.ts" 2>/dev/null | head -1; then
            echo "✅ CO₂Router branding present"
          else
            echo "⚠️ Consider adding CO₂Router branding"
          fi
          
      - name: Check for console.log statements
        run: |
          echo "🚫 Checking for debug statements..."
          
          # Look for console.log in source files
          if grep -r "console\.log" src/ --include="*.tsx" --include="*.ts" 2>/dev/null; then
            echo "❌ Found console.log statements in production code"
            echo "Remove console.log statements before merging"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

  smoke-test:
    name: Dashboard Smoke Test
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Start development server
        run: |
          npm start &
          sleep 10
        env:
          PORT: 3000
          ECOBE_API_URL: http://localhost:8080
          
      - name: Wait for server
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'
          
      - name: Test dashboard load
        run: |
          echo "🖥️ Testing dashboard load..."
          
          # Test main page loads
          if curl -f -s http://localhost:3000 | grep -q "CO₂Router\|CO2Router"; then
            echo "✅ Main dashboard loads with correct branding"
          else
            echo "❌ Main dashboard failed to load"
            exit 1
          fi
          
          # Test DKS integration page loads
          if curl -f -s http://localhost:3000/dekes | grep -q "DKS\|integration"; then
            echo "✅ DKS integration page loads"
          else
            echo "⚠️ DKS integration page may have issues"
          fi
          
          # Test API proxy endpoint
          if curl -f -s "http://localhost:3000/api/integrations/dekes?endpoint=summary&days=7" | head -1; then
            echo "✅ API proxy endpoint responds"
          else
            echo "⚠️ API proxy endpoint may need backend"
          fi
          
          echo "🎉 Dashboard smoke tests passed!"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
        
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: main
          head: HEAD
          extra_args: --debug --only-verified
