name: CO₂Router Engine CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    name: Engine CI
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Type check
        run: npm run type-check
        
      - name: Lint
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Run tests
        run: npm test
        
      - name: Validate core services compile
        run: |
          echo "🔍 Checking core engine components..."
          
          # Check router service
          echo "Checking router service..."
          node -e "
            try {
              require('./dist/lib/green-routing');
              console.log('✅ Router service compiles');
            } catch (e) {
              console.error('❌ Router service failed:', e.message);
              process.exit(1);
            }
          "
          
          # Check Fingard service
          echo "Checking Fingard service..."
          node -e "
            try {
              require('./dist/services/fingard.service');
              console.log('✅ Fingard service compiles');
            } catch (e) {
              console.error('❌ Fingard service failed:', e.message);
              process.exit(1);
            }
          "
          
          # Check provider adapters
          echo "Checking provider adapters..."
          node -e "
            try {
              require('./dist/lib/carbon/provider-router');
              console.log('✅ Provider adapters compile');
            } catch (e) {
              console.error('❌ Provider adapters failed:', e.message);
              process.exit(1);
            }
          "
          
          # Check decision log components
          echo "Checking decision log components..."
          node -e "
            try {
              require('./dist/lib/carbon-command');
              console.log('✅ Decision log components compile');
            } catch (e) {
              console.error('❌ Decision log components failed:', e.message);
              process.exit(1);
            }
          "
          
      - name: Validate API routes
        run: |
          echo "🌐 Validating API routes..."
          
          # Check that all route files can be imported
          node -e "
            const routes = [
              './dist/routes/carbon-command',
              './dist/routes/health',
              './dist/routes/dashboard',
              './dist/routes/decisions',
              './dist/routes/integrations',
              './dist/routes/route',
              './dist/routes/energy',
              './dist/routes/system'
            ];
            
            for (const route of routes) {
              try {
                require(route);
                console.log('✅', route.split('/').pop(), 'route compiles');
              } catch (e) {
                console.error('❌', route.split('/').pop(), 'route failed:', e.message);
                process.exit(1);
              }
            }
          "
          
      - name: Validate environment schema
        run: |
          echo "🔧 Validating environment configuration..."
          node -e "
            try {
              const { env } = require('./dist/config/env');
              console.log('✅ Environment schema loads successfully');
              
              // Test with minimal required env vars
              process.env.DATABASE_URL = 'postgresql://test';
              process.env.REDIS_URL = 'redis://test';
              
              const parsed = env.parse(process.env);
              console.log('✅ Environment validation passes');
            } catch (e) {
              console.error('❌ Environment validation failed:', e.message);
              process.exit(1);
            }
          "

  smoke-test:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: ci
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Build
        run: npm run build
        
      - name: Setup test database
        run: |
          npx prisma db push --force-reset
          npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          
      - name: Start server
        run: |
          npm start &
          sleep 10
        env:
          PORT: 8080
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          
      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8080/health; do sleep 2; done'
          
      - name: Test core endpoints
        run: |
          echo "🧪 Testing core API endpoints..."
          
          # Test health endpoint
          echo "Testing /health..."
          response=$(curl -s http://localhost:8080/health)
          if echo "$response" | grep -q '"status":"healthy"'; then
            echo "✅ Health endpoint working"
          else
            echo "❌ Health endpoint failed"
            echo "Response: $response"
            exit 1
          fi
          
          # Test route endpoint
          echo "Testing /api/v1/route..."
          response=$(curl -s -X POST http://localhost:8080/api/v1/route \
            -H "Content-Type: application/json" \
            -d '{
              "workloadId": "test-123",
              "candidateRegions": ["US-CAL-CISO", "FR"],
              "durationMinutes": 60
            }')
          if echo "$response" | grep -q '"success":true'; then
            echo "✅ Route endpoint working"
          else
            echo "❌ Route endpoint failed"
            echo "Response: $response"
            exit 1
          fi
          
          # Test dashboard metrics
          echo "Testing /api/v1/dashboard/metrics..."
          response=$(curl -s http://localhost:8080/api/v1/dashboard/metrics)
          if echo "$response" | grep -q '"metrics"'; then
            echo "✅ Dashboard metrics working"
          else
            echo "❌ Dashboard metrics failed"
            echo "Response: $response"
            exit 1
          fi
          
          # Test DKS integration endpoints
          echo "Testing /api/v1/integrations/dekes/summary..."
          response=$(curl -s "http://localhost:8080/api/v1/integrations/dekes/summary?days=7")
          if echo "$response" | grep -q '"integration":"DEKES"'; then
            echo "✅ DKS summary endpoint working"
          else
            echo "❌ DKS summary endpoint failed"
            echo "Response: $response"
            exit 1
          fi
          
          echo "Testing /api/v1/integrations/dekes/metrics..."
          response=$(curl -s "http://localhost:8080/api/v1/integrations/dekes/metrics?hours=24")
          if echo "$response" | grep -q '"integration":"DEKES"'; then
            echo "✅ DKS metrics endpoint working"
          else
            echo "❌ DKS metrics endpoint failed"
            echo "Response: $response"
            exit 1
          fi
          
          echo "🎉 All smoke tests passed!"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
        
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          base: main
          head: HEAD
          extra_args: --debug --only-verified
