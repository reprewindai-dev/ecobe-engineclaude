name: Monitoring & Health Checks

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Production Health
        run: |
          echo "🏥 Checking production health..."
          
          # Check Railway production deployment
          PROD_URL="https://ecobe-engineclaude-production.up.railway.app"
          
          # Test health endpoint
          if curl -f -s "$PROD_URL/health" | grep -q '"status":"healthy"'; then
            echo "✅ Production health check passed"
          else
            echo "❌ Production health check failed"
            echo "URL: $PROD_URL/health"
            exit 1
          fi
          
          # Test core API endpoints
          echo "🔍 Testing core endpoints..."
          
          # Test routing endpoint
          if curl -f -s -X POST "$PROD_URL/api/v1/route" \
            -H "Content-Type: application/json" \
            -d '{"workloadId":"health-check","candidateRegions":["US-CAL-CISO"],"durationMinutes":1}' | grep -q '"success"'; then
            echo "✅ Routing endpoint healthy"
          else
            echo "⚠️ Routing endpoint degraded"
          fi
          
          # Test dashboard metrics
          if curl -f -s "$PROD_URL/api/v1/dashboard/metrics" | grep -q '"metrics"'; then
            echo "✅ Dashboard metrics healthy"
          else
            echo "⚠️ Dashboard metrics degraded"
          fi
          
          # Test DKS integration endpoints
          if curl -f -s "$PROD_URL/api/v1/integrations/dekes/summary?days=1" | grep -q '"integration"'; then
            echo "✅ DKS integration healthy"
          else
            echo "⚠️ DKS integration degraded"
          fi

  performance-check:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    
    steps:
      - name: Response Time Check
        run: |
          echo "⚡ Checking response times..."
          
          PROD_URL="https://ecobe-engineclaude-production.up.railway.app"
          
          # Test health endpoint response time
          health_time=$(curl -o /dev/null -s -w '%{time_total}' "$PROD_URL/health")
          if (( $(echo "$health_time < 2.0" | bc -l) )); then
            echo "✅ Health endpoint: ${health_time}s (< 2s)"
          else
            echo "⚠️ Health endpoint slow: ${health_time}s"
          fi
          
          # Test routing endpoint response time
          route_time=$(curl -o /dev/null -s -w '%{time_total}' -X POST "$PROD_URL/api/v1/route" \
            -H "Content-Type: application/json" \
            -d '{"workloadId":"perf-test","candidateRegions":["US-CAL-CISO"],"durationMinutes":1}')
          if (( $(echo "$route_time < 5.0" | bc -l) )); then
            echo "✅ Routing endpoint: ${route_time}s (< 5s)"
          else
            echo "⚠️ Routing endpoint slow: ${route_time}s"
          fi

  dependency-check:
    name: Dependency Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Audit dependencies
        run: |
          echo "🔒 Checking for security vulnerabilities..."
          
          # Run audit and capture results
          audit_output=$(npm audit --json)
          
          # Check for high/critical vulnerabilities
          high_vulns=$(echo "$audit_output" | jq -r '.vulnerabilities | to_entries[] | select(.value.severity >= 6) | .key' | wc -l)
          critical_vulns=$(echo "$audit_output" | jq -r '.vulnerabilities | to_entries[] | select(.value.severity >= 9) | .key' | wc -l)
          
          if [ "$critical_vulns" -gt 0 ]; then
            echo "❌ $critical_vulns critical vulnerabilities found"
            echo "$audit_output" | jq -r '.vulnerabilities | to_entries[] | select(.value.severity >= 9) | {name: .key, severity: .value.severity}'
            exit 1
          elif [ "$high_vulns" -gt 0 ]; then
            echo "⚠️ $high_vulns high vulnerabilities found"
            echo "$audit_output" | jq -r '.vulnerabilities | to_entries[] | select(.value.severity >= 6 and .value.severity < 9) | {name: .key, severity: .value.severity}'
          else
            echo "✅ No high or critical vulnerabilities found"
          fi
          
      - name: Check outdated packages
        run: |
          echo "📦 Checking for outdated packages..."
          
          outdated=$(npm outdated --json)
          major_updates=$(echo "$outdated" | jq -r 'to_entries[] | select(.value.type == "dependencies" and (.value.current | split("[.]") | map(tonumber) | .[0]) < (.value.latest | split("[.]") | map(tonumber) | .[0]) | .key' | wc -l)
          
          if [ "$major_updates" -gt 5 ]; then
            echo "⚠️ $major_updates major updates available"
          else
            echo "✅ Dependency updates are manageable"
          fi

  integration-check:
    name: Integration Health
    runs-on: ubuntu-latest
    
    steps:
      - name: Check DKS Integration
        run: |
          echo "🔗 Checking DKS integration health..."
          
          PROD_URL="https://ecobe-engineclaude-production.up.railway.app"
          
          # Test DKS-specific endpoints
          echo "Testing DKS integration endpoints..."
          
          # Check if DKS endpoints respond
          summary_status=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/v1/integrations/dekes/summary?days=7")
          metrics_status=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/v1/integrations/dekes/metrics?hours=24")
          
          if [ "$summary_status" = "200" ] && [ "$metrics_status" = "200" ]; then
            echo "✅ DKS integration endpoints healthy"
            
            # Check for recent activity
            summary_data=$(curl -s "$PROD_URL/api/v1/integrations/dekes/summary?days=7")
            workloads=$(echo "$summary_data" | jq -r '.metrics.totalWorkloads // 0')
            
            if [ "$workloads" -gt 0 ]; then
              echo "✅ DKS integration active ($workloads workloads in 7 days)"
            else
              echo "⚠️ DKS integration configured but no recent activity"
            fi
          else
            echo "❌ DKS integration endpoints failed"
            echo "Summary status: $summary_status"
            echo "Metrics status: $metrics_status"
          fi
